name: brainbox_ai
description: "BrainBox AI — Smart personal memory assistant. Fully offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File & Storage
  path_provider: ^2.1.4
  file_picker: ^12.0.0-beta.7
  image_picker: ^1.1.2

  # Audio
  record: ^7.1.1
  audioplayers: ^6.1.0

  # PDF
  flutter_pdfview: ^1.4.4

  # Permissions
  permission_handler: ^12.0.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^13.2.0
  path: ^1.9.0

  # UI
  google_fonts: ^8.1.0
  flutter_staggered_animations: ^1.1.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  generate: true
